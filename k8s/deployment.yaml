apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-dashboard
  namespace: health
  labels:
    app: health-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-dashboard
  template:
    metadata:
      labels:
        app: health-dashboard
    spec:
      serviceAccountName: health-dashboard
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: health-dashboard
          image: ghcr.io/ceesco53/health-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            # Trusts in-cluster service account CA for k8s API calls
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
